<title>Stylish Letter Box Flow</title>
<style>
body {
    font-family: 'Arial', sans-serif;
    text-align: center;
    background: linear-gradient(120deg, #89f7fe, #66a6ff);
    padding: 50px;
}

/* Stylish Letter Box */
.letter-box {
    width: 320px;
    height: 360px;
    margin: 0 auto;
    background: linear-gradient(145deg, #fff, #e0e0e0);
    border-radius: 20px;
    box-shadow: 8px 8px 15px rgba(0,0,0,0.2), -8px -8px 15px rgba(255,255,255,0.7);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    transition: transform 0.3s;
}

.letter-box:hover {
    transform: translateY(-5px);
}

/* Images */
.letter-box img {
    max-width: 90%;
    max-height: 220px;
    margin-bottom: 15px;
    border-radius: 15px;
    border: 2px solid rgba(0,0,0,0.1);
    display: none; /* hidden initially */
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: opacity 0.5s;
}

/* Button */
.letter-box button {
    padding: 10px 25px;
    font-size: 16px;
    border: none;
    background: linear-gradient(90deg, #ff7e5f, #feb47b);
    color: #fff;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: transform 0.2s, box-shadow 0.2s;
}

.letter-box button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.3);
}

/* Letter text */
#letter-text {
    font-size: 16px;
    font-weight: 500;
    color: #333;
    margin-bottom: 10px;
}
</style>
</head>
<body>


    <body style="background: url('https://i.pinimg.com/originals/3e/5c/d6/3e5cd64b33cd1b71cfb8b73d2ff1ec4f.gif') center/cover no-repeat fixed;"></body>




<div class="letter-box">
    <p id="letter-text">You received a special letter! 📬</p>
    <img id="slide-image" src="" alt="Slide Image">
    <button id="action-btn">Open</button>
</div>

<script>
// Images array
const images = ["image.jfif", "download (2).jfif", "Motto.jfif","download (3).jfif","image3.jfif","download (6).jfif","download (5).jfif","download2.gif", "bighug.jfif"]; // replace with your image paths
let step = 0;

const slideImage = document.getElementById("slide-image");
const actionBtn = document.getElementById("action-btn");
const letterText = document.getElementById("letter-text");

actionBtn.addEventListener("click", () => {
    if(step === 0){
        slideImage.src = images[0];
        slideImage.style.display = "block";
        slideImage.style.opacity = 0;
        setTimeout(() => slideImage.style.opacity = 1, 50); // fade effect
        letterText.textContent = "Here’s the first surprise! 🎉";
        actionBtn.textContent = "Next";
        step++;
    } else if(step < images.length){
        slideImage.src = images[step];
        slideImage.style.opacity = 0;
        setTimeout(() => slideImage.style.opacity = 1, 50); // fade effect
        letterText.textContent = `Here’s surprise ${step + 1}! ✨`;
        step++;
        if(step === images.length){
            actionBtn.style.display = "none";
            letterText.textContent = "Hope you enjoyed all surprises! ❤️";
        }
    }
});
</script>






<body>

<body>

<!-- PLAY BUTTON -->
<button onclick="playVideo()" style="padding:10px 20px; font-size:16px;">Play Video 🎬</button>

<!-- FULLSCREEN VIDEO OVERLAY -->
<div id="videoOverlay" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-color:rgba(0,0,0,0.9);
    z-index:9999;
    justify-content:center;
    align-items:center;
">
  <video id="myVideo" width="90%" controls style="max-height:90%;">
    <source src="brosislove.mp4" type="video/mp4">
  </video>
  
  <!-- CLOSE BUTTON -->
  <button onclick="closeVideo()" style="
      position:absolute;
      top:20px;
      right:20px;
      padding:10px 15px;
      font-size:18px;
      background:red;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
  ">✖ Close</button>
</div>

<script>
function playVideo() {
  let overlay = document.getElementById("videoOverlay");
  let video = document.getElementById("myVideo");

  overlay.style.display = "flex";  // overlay show
  video.play();                     // video play
}

function closeVideo() {
  let overlay = document.getElementById("videoOverlay");
  let video = document.getElementById("myVideo");

  video.pause();                    // stop video
  video.currentTime = 0;            // reset
  overlay.style.display = "none";   // hide overlay
}
</script>

</body>
